<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6BCF7F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4FA665;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgGradient)"/>
  
  <!-- Outer circle (target ring) -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="#FFFFFF" stroke-width="20" opacity="0.3"/>
  <circle cx="512" cy="512" r="360" fill="none" stroke="#FFFFFF" stroke-width="15" opacity="0.3"/>
  <circle cx="512" cy="512" r="300" fill="none" stroke="#FFFFFF" stroke-width="10" opacity="0.3"/>
  
  <!-- Main circle with question mark -->
  <circle cx="512" cy="512" r="240" fill="url(#circleGradient)"/>
  <circle cx="512" cy="512" r="240" fill="none" stroke="#FFFFFF" stroke-width="8" opacity="0.2"/>
  
  <!-- Question mark -->
  <text x="512" y="620" font-family="Arial, sans-serif" font-size="280" font-weight="bold" fill="#FFFFFF" text-anchor="middle">?</text>
  
  <!-- Numbers around the circle -->
  <text x="512" y="200" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#FFFFFF" text-anchor="middle" opacity="0.9">42</text>
  <text x="800" y="520" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="#FFFFFF" text-anchor="middle" opacity="0.8">7</text>
  <text x="512" y="850" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="#FFFFFF" text-anchor="middle" opacity="0.8">99</text>
  <text x="220" y="520" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="#FFFFFF" text-anchor="middle" opacity="0.8">13</text>
</svg>

